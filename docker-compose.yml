services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: paracal-backend
    ports:
      - "3000:3001"
    volumes:
      - paracal-logs:/app/backend/logs
    env_file: ./backend/.env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - paracal-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_API_BASE_URL=/api
    container_name: paracal-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - paracal-network

networks:
  paracal-network:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: "fd00:dead:beef::/48"

volumes:
  paracal-logs: